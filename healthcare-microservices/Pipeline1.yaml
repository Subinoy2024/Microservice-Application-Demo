pipeline:
  name: healthcare-microservices-ci
  identifier: healthapppipeline
  projectIdentifier: HealthAPP
  orgIdentifier: default
  description: |
    Granular CI: compile -> unit test -> token preflight -> build with
    coverage -> SonarCloud upload -> quality gate -> docker build & push.
  tags:
    app: healthcare-microservices
    style: granular-steps
  properties:
    ci:
      codebase:
        connectorRef: Subinoy2024
        repoName: Microservice-Application-Demo
        build: <+input>
  variables:
    - name: sonar_host
      type: String
      value: <+input>.default(https://sonarcloud.io)
    - name: sonar_organization
      type: String
      value: <+input>.default(subinoy2024)
    - name: docker_repo_namespace
      type: String
      value: <+input>.default(subinoy2024)
    - name: image_tag
      type: String
      value: build-<+pipeline.sequenceId>
  stages:
    - stage:
        name: Unit Tests
        identifier: unit_tests
        type: CI
        strategy:
          matrix:
            service:
              - appointment-service
              - doctor-service
              - patient-service
              - report-service
              - user-service
            maxConcurrency: 2
        spec:
          cloneCodebase: true
          caching:
            enabled: true
            paths:
              - /root/.m2/repository
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Docker
            spec: {}
          execution:
            steps:
              - step:
                  type: Run
                  name: Compile Code
                  identifier: compile_code
                  timeout: 10m
                  spec:
                    connectorRef: subdenadocker
                    image: maven:3.9.8-eclipse-temurin-17
                    shell: Sh
                    command: mvn -B -ntp compile -f healthcare-microservices/<+matrix.service>/pom.xml
                    envVariables:
                      MAVEN_OPTS: "-Dmaven.repo.local=/root/.m2/repository"
              - step:
                  type: Run
                  name: Run Unit Tests
                  identifier: run_unit_tests
                  timeout: 15m
                  spec:
                    connectorRef: subdenadocker
                    image: maven:3.9.8-eclipse-temurin-17
                    shell: Sh
                    command: mvn -B -ntp test -f healthcare-microservices/<+matrix.service>/pom.xml
                    reports:
                      type: JUnit
                      spec:
                        paths:
                          - healthcare-microservices/<+matrix.service>/target/surefire-reports/*.xml
                    envVariables:
                      MAVEN_OPTS: "-Dmaven.repo.local=/root/.m2/repository"
    - stage:
        name: Sonar Scan And Gate
        identifier: sonar_scan_gate
        type: CI
        strategy:
          matrix:
            service:
              - appointment-service
              - doctor-service
              - patient-service
              - report-service
              - user-service
            maxConcurrency: 2
        spec:
          cloneCodebase: true
          caching:
            enabled: true
            paths:
              - /root/.m2/repository
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Docker
            spec: {}
          execution:
            steps:
              - parallel:
                  - step:
                      type: Run
                      name: Check Sonar Token
                      identifier: check_sonar_token
                      timeout: 5m
                      spec:
                        connectorRef: subdenadocker
                        image: python:3.12-slim
                        shell: Python
                        envVariables:
                          SONAR_TOKEN: <+secrets.getValue("sonarqube")>
                          SONAR_HOST: <+pipeline.variables.sonar_host>
                          SONAR_ORG: <+pipeline.variables.sonar_organization>
                        command: |
                          # Diagnoses the exact token the pipeline receives - never prints it.
                          import base64, json, os, sys, urllib.request

                          raw = os.environ.get("SONAR_TOKEN", "")
                          host = os.environ["SONAR_HOST"].rstrip("/")
                          org = os.environ["SONAR_ORG"]

                          print(f"Token length: {len(raw)}")
                          print(f"Leading/trailing whitespace: {raw != raw.strip()}")
                          if not raw.strip():
                              print("FATAL: SONAR_TOKEN is EMPTY - Harness secret 'sonarqube' resolved to nothing.")
                              sys.exit(1)

                          tok = raw.strip()
                          auth = base64.b64encode(f"{tok}:".encode()).decode()

                          def api(path):
                              req = urllib.request.Request(host + path)
                              req.add_header("Authorization", "Basic " + auth)
                              with urllib.request.urlopen(req, timeout=30) as r:
                                  return json.load(r)

                          v = api("/api/authentication/validate")
                          print(f"Token valid: {v.get('valid')}")
                          if not v.get("valid"):
                              print("FATAL: SonarCloud rejects this token - the secret holds a different token than the one verified on the VM.")
                              sys.exit(1)

                          orgs = api("/api/organizations/search?member=true")
                          keys = [o["key"] for o in orgs.get("organizations", [])]
                          print(f"Token's organizations: {keys}")
                          if org not in keys:
                              print(f"FATAL: token valid but its account is NOT a member of '{org}'.")
                              sys.exit(1)

                          print(f"PREFLIGHT OK: token valid and member of '{org}'.")
                  - step:
                      type: Run
                      name: Build With Coverage
                      identifier: build_with_coverage
                      timeout: 15m
                      spec:
                        connectorRef: subdenadocker
                        image: maven:3.9.8-eclipse-temurin-17
                        shell: Sh
                        command: mvn -B -ntp -f healthcare-microservices/<+matrix.service>/pom.xml org.jacoco:jacoco-maven-plugin:0.8.12:prepare-agent verify org.jacoco:jacoco-maven-plugin:0.8.12:report
                        envVariables:
                          MAVEN_OPTS: "-Dmaven.repo.local=/root/.m2/repository"
              - step:
                  type: Run
                  name: Upload To SonarCloud
                  identifier: upload_to_sonarcloud
                  timeout: 15m
                  spec:
                    connectorRef: subdenadocker
                    image: maven:3.9.8-eclipse-temurin-17
                    shell: Sh
                    envVariables:
                      SONAR_TOKEN: <+secrets.getValue("sonarqube")>
                      MAVEN_OPTS: "-Dmaven.repo.local=/root/.m2/repository"
                    command: mvn -B -ntp -f healthcare-microservices/<+matrix.service>/pom.xml org.sonarsource.scanner.maven:sonar-maven-plugin:4.0.0.4121:sonar -Dsonar.host.url=<+pipeline.variables.sonar_host> -Dsonar.token=$SONAR_TOKEN -Dsonar.organization=<+pipeline.variables.sonar_organization> -Dsonar.projectKey=<+pipeline.variables.sonar_organization>_<+matrix.service> -Dsonar.projectName=<+matrix.service> -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml
              - step:
                  type: Run
                  name: Verify Quality Gate
                  identifier: verify_quality_gate
                  timeout: 10m
                  spec:
                    connectorRef: subdenadocker
                    image: python:3.12-slim
                    shell: Python
                    envVariables:
                      SONAR_TOKEN: <+secrets.getValue("sonarqube")>
                      SONAR_HOST: <+pipeline.variables.sonar_host>
                      PROJECT_KEY: <+pipeline.variables.sonar_organization>_<+matrix.service>
                    command: |
                      # Polls until analysis is processed, then enforces the Quality Gate.
                      import base64, json, os, sys, time, urllib.request

                      host  = os.environ["SONAR_HOST"].rstrip("/")
                      key   = os.environ["PROJECT_KEY"]
                      token = os.environ["SONAR_TOKEN"].strip()

                      auth = base64.b64encode(f"{token}:".encode()).decode()

                      def api(path):
                          req = urllib.request.Request(host + path)
                          req.add_header("Authorization", "Basic " + auth)
                          with urllib.request.urlopen(req, timeout=30) as r:
                              return json.load(r)

                      # 1) Wait for SonarCloud to finish processing the report
                      for attempt in range(30):
                          activity = api(f"/api/ce/component?component={key}")
                          if not activity.get("queue"):
                              break
                          print(f"Analysis still processing... ({attempt + 1}/30)")
                          time.sleep(10)

                      # 2) Fetch the verdict
                      status = api(f"/api/qualitygates/project_status?projectKey={key}")
                      gate = status["projectStatus"]["status"]
                      print(f"Quality Gate for {key}: {gate}")

                      # 3) Print each condition for readable logs
                      for cond in status["projectStatus"].get("conditions", []):
                          flag = "PASS" if cond["status"] == "OK" else "FAIL"
                          print(f"  [{flag}] {cond['metricKey']}: actual={cond.get('actualValue')} threshold={cond.get('errorThreshold')}")

                      # 4) Verdict handling
                      if gate == "NONE":
                          print("WARNING: no quality gate computed yet (first analysis) - passing this run.")
                          sys.exit(0)
                      sys.exit(0 if gate == "OK" else 1)
    - stage:
        name: Docker Build
        identifier: docker_build
        type: CI
        strategy:
          matrix:
            service:
              - appointment-service
              - doctor-service
              - patient-service
              - report-service
              - user-service
            maxConcurrency: 2
        spec:
          cloneCodebase: true
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Docker
            spec: {}
          execution:
            steps:
              - step:
                  type: BuildAndPushDockerRegistry
                  name: Build And Push Image
                  identifier: build_push_image
                  timeout: 25m
                  spec:
                    connectorRef: subdenadocker
                    repo: <+pipeline.variables.docker_repo_namespace>/<+matrix.service>
                    tags:
                      - <+pipeline.variables.image_tag>
                      - ci
                    dockerfile: healthcare-microservices/<+matrix.service>/Dockerfile
                    context: healthcare-microservices/<+matrix.service>
                    caching: true
